name: Release sandbox zip

# Builds the standalone jdwp-sandbox distribution and attaches it to the
# GitHub Release. Triggers on tag pushes that look like a version (v* or
# 2.0.0-style), and is also runnable manually via the Actions UI.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the zip (e.g. 2.0.0). Defaults to the tag or marketplace.json."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"   # strip leading v if present
          else
            VERSION="$(grep -m1 '"version"' .claude-plugin/marketplace.json \
              | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved sandbox version: $VERSION"

      - name: Assemble sandbox zip
        run: |
          chmod +x release/sandbox/assemble.sh
          release/sandbox/assemble.sh "${{ steps.version.outputs.version }}"
          # Produce an unversioned alias so the "latest" download URL is stable
          # across releases (https://.../releases/latest/download/jdwp-sandbox.zip).
          cp "release/sandbox/dist/jdwp-sandbox-${{ steps.version.outputs.version }}.zip" \
             "release/sandbox/dist/jdwp-sandbox.zip"

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jdwp-sandbox-${{ steps.version.outputs.version }}
          path: release/sandbox/dist/jdwp-sandbox-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/sandbox/dist/jdwp-sandbox-${{ steps.version.outputs.version }}.zip
            release/sandbox/dist/jdwp-sandbox.zip
          fail_on_unmatched_files: true
